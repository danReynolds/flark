<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flark is a source-first Markdown editor and read-only previewer for Flutter. Edit Markdown live, in place, while the document stays canonical Markdown — backed by native Comrak parsing on mobile, desktop, and web.">
  <meta name="theme-color" content="#FBF6EC">

  <!-- Open Graph / social previews -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Flark — Markdown-first editing for Flutter">
  <meta property="og:description" content="Edit Markdown live, in place, while the document stays canonical Markdown. Native Comrak parsing on native and web.">
  <meta property="og:url" content="https://danreynolds.github.io/flark/">
  <meta name="twitter:card" content="summary_large_image">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Flark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Flark Markdown Editor</title>
  <link rel="manifest" href="manifest.json">

  <!-- Match the app's warm paper background so first paint isn't a white flash. -->
  <style>
    html, body { margin: 0; padding: 0; background-color: #FBF6EC; }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
