name: flark
description: A Flutter markdown editor and read-only previewer with native CommonMark/GFM parsing.
version: 0.1.0
homepage: https://danreynolds.github.io/flark/
repository: https://github.com/danReynolds/flark
issue_tracker: https://github.com/danReynolds/flark/issues
documentation: https://danreynolds.github.io/flark/
topics:
  - markdown
  - editor
  - flutter
  - commonmark
  - gfm
screenshots:
  - description: Flark source editor, live-rendered editor, and preview surfaces.
    path: screenshots/flark_surfaces.png

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.4
  hooks: ^1.0.3
  code_assets: ^1.0.0
  highlight: ^0.7.0
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  html: ^0.15.6

flutter:
  uses-material-design: true
  assets:
    - lib/assets/wasm/flark_comrak_bridge.wasm
